<!-- ===== SUPABASE ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

  document.getElementById("folder-select").addEventListener("change", function () {
  const newFolderGroup = document.getElementById("new-folder-group");

  if (this.value === "new") {
    newFolderGroup.style.display = "block";
  } else {
    newFolderGroup.style.display = "none";
  }
});

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const BUCKET = "Homepage";

let slides = [];
let cur = 0;

// =====================
// LOAD IMAGES
// =====================
async function loadCarousel() {

  const { data, error } = await sb.storage
    .from(BUCKET)
    .list("", { limit: 100 });


  if (error) return;

  const images = data
    .filter(f => /\.(jpg|jpeg|png|webp|gif)$/i.test(f.name))
    .map(f => f.name);


  slides = [];

  for (let i = 0; i < images.length; i += 3) {
    slides.push(images.slice(i, i + 3));
  }

  render();
}

// =====================
// RENDER CAROUSEL
// =====================
function render() {
  const track = document.getElementById("carousel-track");
  const dots = document.getElementById("carousel-dots");

  track.innerHTML = "";
  dots.innerHTML = "";

  if (!slides.length) {
    track.innerHTML = "<div class='slide'>No images found</div>";
    return;
  }

  slides.forEach((group, i) => {
    const slide = document.createElement("div");
    slide.className = "slide";

    group.forEach(file => {
      const url = sb.storage
        .from(BUCKET)
        .getPublicUrl(file).data.publicUrl;


      const img = document.createElement("img");
      img.src = url;
      img.loading = "lazy";

      slide.appendChild(img);
    });

    track.appendChild(slide);

    const dot = document.createElement("div");
    dot.className = "dot" + (i === 0 ? " active" : "");
    dot.onclick = () => goTo(i);
    dots.appendChild(dot);
  });

  goTo(0);
}

// =====================
// CAROUSEL CONTROL
// =====================
function goTo(i) {
  cur = (i + slides.length) % slides.length;

  document.getElementById("carousel-track").style.transform =
    `translateX(-${cur * 100}%)`;

  document.querySelectorAll(".dot").forEach((d, idx) =>
    d.classList.toggle("active", idx === cur)
  );
}

function moveCarousel(dir) {
  goTo(cur + dir);
}

// =====================
// UPLOAD
// =====================
async function uploadPhoto() {
  const file = document.getElementById('photo-input').files[0];
  const folder = document.getElementById('folder-select').value;
  const status = document.getElementById('upload-status');

  if (!file) {
    status.textContent = "Pick a file";
    return;
  }

  if (!folder) {
    status.textContent = "Pick a folder";
    return;
  }

  status.textContent = "Uploading...";

  let bucket;
  let path;

  // ─────────────────────────────
  // ROUTE TO CORRECT BUCKET
  // ─────────────────────────────

    if (folder === "homepage") {

      bucket = "Homepage";
      path = `${Date.now()}_${file.name}`;

    } else {

      bucket = "Inspo Pics";

      let folderName;

      if (folder === "new") {

        folderName = document
          .getElementById("new-folder-name")
          .value
          .trim();

        if (!folderName) {
          status.textContent = "Enter a folder name";
          return;
        }

      } else {

        // folderName =
        //   folder.charAt(0).toUpperCase() + folder.slice(1);
        folderName = folder;

      }

      path = `${folderName}/${Date.now()}_${file.name}`;
    }

  const { data, error } = await sb.storage
    .from(bucket)
    .upload(path, file, { upsert: false });


  if (error) {
    status.textContent = error.message;
    return;
  }

  status.textContent = "Uploaded!";
  loadCarousel();
  loadFolders();
}

// =====================
loadCarousel();
loadFolders();

// =====================
// DATING COUNTER
// =====================
const ORIGIN_DATE = new Date(2026, 2, 24, 11, 30, 0);

function updateCounter() {
  const now = new Date();
  const diff = now - ORIGIN_DATE;

  if (diff < 0) return;

  const totalMinutes = Math.floor(diff / 60000);
  const totalHours = Math.floor(totalMinutes / 60);
  const totalDays = Math.floor(totalHours / 24);

  const remHours = totalHours % 24;
  const remMinutes = totalMinutes % 60;

  const daysEl = document.getElementById("days-count");
  const hoursEl = document.getElementById("hours-count");
  const minutesEl = document.getElementById("minutes-count");

  if (!daysEl || !hoursEl || !minutesEl) {
    console.log("❌ Counter elements missing");
    return;
  }

  daysEl.textContent = totalDays;
  hoursEl.textContent = remHours;
  minutesEl.textContent = remMinutes;
}

// run it immediately + keep updating
updateCounter();
setInterval(updateCounter, 1000);

const checkbox = document.getElementById("theme-checkbox");
const root = document.documentElement;

// load saved theme
const savedTheme = localStorage.getItem("abbiebenTheme") || "light";

if (savedTheme === "dark") {
  root.setAttribute("data-theme", "dark");
  checkbox.checked = true;
}

// toggle theme
checkbox.addEventListener("change", () => {
  if (checkbox.checked) {
    root.setAttribute("data-theme", "dark");
    localStorage.setItem("abbiebenTheme", "dark");
  } else {
    root.setAttribute("data-theme", "light");
    localStorage.setItem("abbiebenTheme", "light");
  }

});
async function loadFolders() {
  const select = document.getElementById("folder-select");

  select.innerHTML = `
    <option value="">Select folder</option>
    <option value="homepage">Homepage</option>
  `;

  const { data, error } = await sb.storage
    .from("Inspo Pics")
    .list("", { limit: 1000 }); // Remove recursive: true

  if (error) {
    console.error(error);
    return;
  }

  console.log("FILES:", data); // Should now show folder objects

  const folderSet = new Set();

  for (const item of data) {
    if (!item.name) continue;

    // Supabase folders have id: null and no file extension
    if (item.id === null) {
      folderSet.add(item.name);
    }
  }

  Array.from(folderSet)
    .sort()
    .forEach(folder => {
      const option = document.createElement("option");
      option.value = folder;
      option.textContent = folder;
      select.appendChild(option);
    });

  const newOption = document.createElement("option");
  newOption.value = "new";
  newOption.textContent = "New Folder";
  select.appendChild(newOption);
}

function showFileName(input) {
  const fileNameEl = document.getElementById("selected-file-name");
  const fileLabel = document.querySelector(".file-drop span");

  if (input.files && input.files[0]) {
    const name = input.files[0].name;
    fileLabel.textContent = name; // Updates the "Click to select a photo" text
    fileNameEl.textContent = name; // Also updates the div below (optional)
  } else {
    fileLabel.textContent = "Click to select a photo"; // Resets if no file
    fileNameEl.textContent = "";
  }
}
</script>

<script>
  /* Waffle menu */
  const waffleBtn = document.getElementById('waffle-btn');
  const drawer    = document.getElementById('nav-drawer');

  waffleBtn.addEventListener('click', () => {
    drawer.classList.toggle('open');
  });

  drawer.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => drawer.classList.remove('open'));
  });

  document.addEventListener('click', (e) => {
    if (!drawer.contains(e.target) && !waffleBtn.contains(e.target)) {
      drawer.classList.remove('open');
    }
  });

  /* QR Code */
  const qrBtn    = document.getElementById('qr-btn');
  const qrModal  = document.getElementById('qr-modal');
  const qrClose  = document.getElementById('qr-close');
  const qrCanvas = document.getElementById('qr-canvas');
  let qrDone     = false;

  qrBtn.addEventListener('click', () => {
    if (!qrDone) {
      const url = window.location.href;
      document.getElementById('qr-url-text').textContent = url;
      QRCode.toCanvas(qrCanvas, url, { width: 220, margin: 2,
        color: { dark: '#FF2D78', light: '#ffffff' }
      });
      qrDone = true;
    }
    qrModal.classList.add('open');
  });

  qrClose.addEventListener('click', () => qrModal.classList.remove('open'));
  qrModal.addEventListener('click', (e) => {
    if (e.target === qrModal) qrModal.classList.remove('open');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') qrModal.classList.remove('open');
  });
</script>
