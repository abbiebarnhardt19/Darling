<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspo Pics – Abbie + Ben</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="CSS/themes.css" />
  <link rel="stylesheet" href="CSS/inspo styles.css" />
  <link rel="stylesheet" href="CSS/general app styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <style>
    /* Ensure the modal title uses the theme-aware color */
    .modal-title {
      font-family: 'Pacifico', cursive;
      font-size: 1.6rem;
      color: var(--modal-title-color, #e07fa0);
    }
    [data-theme="dark"] .modal-title {
      color: #f4a7bf;
    }

    /* Header readability fixes */
    .inspo-header h1 {
      color: var(--accent, #e07fa0);
    }
    .inspo-header p {
      color: var(--text-muted, #888);
    }
    [data-theme="dark"] .inspo-header h1 { color: #f4a7bf; }
    [data-theme="dark"] .inspo-header p { color: #bbb; }
  </style>
</head>

<body>

  <div class="qr-modal-overlay" id="qr-modal">
    <div class="qr-modal-box">
      <button class="qr-modal-close" id="qr-close">✕</button>
      <p class="qr-modal-title">Open on your phone</p>
      <p class="qr-modal-subtitle">Scan with your camera to open this page on any device.</p>
      <canvas id="qr-canvas"></canvas>
      <p class="qr-url-text" id="qr-url-text"></p>
    </div>
  </div>

  <nav>
    <a class="nav-logo" href="index.html">
      <span class="nav-title">Abbie + Ben</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="games.html">Games</a></li>
      <li><a href="names.html">Names</a></li>
      <li><a href="calendar.html">Calendar</a></li>
      <li><a href="inspo.html" class="active">Inspo Pics</a></li>
    </ul>
    <div class="nav-right">
      <button class="nav-qr-btn" id="qr-btn" title="Open on your phone">📱</button>
      <div class="theme-toggle-wrapper">
        <label class="theme-toggle">
          <input type="checkbox" id="theme-checkbox" />
          <span class="track"></span>
          <span class="knob"></span>
        </label>
      </div>
      <button class="nav-waffle" id="waffle-btn" aria-label="Open menu">
        <span class="waffle-icon">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </span>
      </button>
    </div>
  </nav>

  <nav class="nav-drawer" id="nav-drawer">
    <a href="index.html">Home</a>
    <a href="games.html">Games</a>
    <a href="names.html">Names</a>
    <a href="calendar.html">Calendar</a>
    <a href="inspo.html" class="active">Inspo Pics</a>
  </nav>

  <div class="inspo-header" style="text-align: center; padding: 2rem 1rem;">
    <h1>Inspo Pics ✨</h1>
    <p>Click a folder to browse &amp; save photos</p>
  </div>

  <div class="polaroid-grid" id="polaroid-grid">
    <div class="state-msg" id="grid-status">Loading folders...</div>
  </div>

  <div class="modal-overlay" id="gallery-modal">
    <div class="modal-box">
      <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <span class="modal-title" id="modal-title">Folder</span>
        <button class="modal-close" onclick="closeModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text-muted);">✕</button>
      </div>
      <div class="gallery-grid" id="gallery-grid">
        <div class="modal-loading">Loading images...</div>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightbox-img" src="" alt="Full size" />
    <button class="lightbox-dl" id="lightbox-dl-btn" onclick="downloadCurrent()">⬇ Save to Photos</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <script>
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const INSPO_BUCKET = "Inspo Pics";
    const tilts = [-3, 2, -1.5, 3, -2.5, 1, -2, 2.5];

    // ── THEME ──
    const checkbox = document.getElementById("theme-checkbox");
    const root = document.documentElement;
    const savedTheme = localStorage.getItem("abbiebenTheme") || "light";
    if (savedTheme === "dark") {
      root.setAttribute("data-theme", "dark");
      checkbox.checked = true;
    }
    checkbox.addEventListener("change", () => {
      const theme = checkbox.checked ? "dark" : "light";
      root.setAttribute("data-theme", theme);
      localStorage.setItem("abbiebenTheme", theme);
    });

    // ── LOAD FOLDERS ──
    async function loadFolders() {
      const grid = document.getElementById("polaroid-grid");
      const status = document.getElementById("grid-status");
      const { data, error } = await sb.storage.from(INSPO_BUCKET).list("", { limit: 1000 });
      if (error) { status.textContent = "Error loading folders"; return; }
      const folders = data.filter(item => item.id === null && item.name);
      if (!folders.length) { status.textContent = "No folders found"; return; }
      status.remove();
      for (let i = 0; i < folders.length; i++) {
        const card = await buildPolaroid(folders[i].name, tilts[i % tilts.length]);
        grid.appendChild(card);
      }
    }

    async function buildPolaroid(folderName, tilt) {
      const card = document.createElement("div");
      card.className = "polaroid";
      card.style.setProperty("--tilt", `${tilt}deg`);
      card.onclick = () => openGallery(folderName);

      const label = document.createElement("div");
      label.className = "polaroid-label";
      label.textContent = folderName;

      const placeholder = document.createElement("div");
      placeholder.className = "polaroid-photo";
      placeholder.style.backgroundColor = "var(--primary-pale)";
      card.appendChild(placeholder);
      card.appendChild(label);

      const { data } = await sb.storage.from(INSPO_BUCKET).list(folderName, { limit: 100 });
      if (data && data.length) {
        const images = data.filter(f => /\.(jpg|jpeg|png|webp|gif)$/i.test(f.name));
        if (images.length) {
          const pick = images[Math.floor(Math.random() * images.length)];
          const url = sb.storage.from(INSPO_BUCKET).getPublicUrl(`${folderName}/${pick.name}`).data.publicUrl;
          const img = document.createElement("img");
          img.className = "polaroid-photo";
          img.src = url;
          img.onload = () => card.replaceChild(img, placeholder);
        }
      }
      return card;
    }

    async function openGallery(folderName) {
      document.getElementById("modal-title").textContent = folderName;
      const grid = document.getElementById("gallery-grid");
      grid.innerHTML = '<div class="modal-loading">Loading...</div>';
      document.getElementById("gallery-modal").classList.add("open");
      document.body.style.overflow = "hidden";

      const { data, error } = await sb.storage.from(INSPO_BUCKET).list(folderName, { limit: 500 });
      if (error || !data.length) { grid.innerHTML = "No images found"; return; }
      const images = data.filter(f => /\.(jpg|jpeg|png|webp|gif)$/i.test(f.name));
      grid.innerHTML = "";
      images.forEach(file => {
        const url = sb.storage.from(INSPO_BUCKET).getPublicUrl(`${folderName}/${file.name}`).data.publicUrl;
        const item = document.createElement("div");
        item.className = "gallery-item";
        const img = document.createElement("img");
        img.src = url;
        img.onclick = () => openLightbox(url, file.name);
        const btn = document.createElement("button");
        btn.className = "dl-btn";
        btn.textContent = "⬇ Save";
        btn.onclick = (e) => { e.stopPropagation(); downloadFile(url, file.name); };
        item.appendChild(img);
        item.appendChild(btn);
        grid.appendChild(item);
      });
    }

    let currentUrl = "";
    let currentName = "";
    function openLightbox(url, name) {
      currentUrl = url; currentName = name;
      document.getElementById("lightbox-img").src = url;
      document.getElementById("lightbox").classList.add("open");
    }
    function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); }
    function closeModal() { document.getElementById("gallery-modal").classList.remove("open"); document.body.style.overflow = ""; }
    function downloadCurrent() { downloadFile(currentUrl, currentName); }

    // ── 📱 MOBILE-FIRST DOWNLOAD LOGIC ──
    async function downloadFile(url, filename) {
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        const file = new File([blob], filename, { type: blob.type });

        // Use Share API for Mobile (triggers "Save Image" to Camera Roll)
        if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({
            files: [file],
            title: 'Save to Photos',
          });
        } else {
          // Desktop Fallback
          const blobUrl = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = blobUrl;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(blobUrl);
        }
      } catch (err) {
        console.error("Download failed:", err);
        // Last resort: Open in new tab with Supabase download param
        window.open(url + "?download=", "_blank");
      }
    }

    // Close on background click
    document.getElementById("gallery-modal").addEventListener("click", e => { if(e.target.id === "gallery-modal") closeModal(); });
    document.getElementById("lightbox").addEventListener("click", e => { if(e.target.id === "lightbox") closeLightbox(); });
    document.addEventListener("keydown", e => { if(e.key === "Escape") { closeModal(); closeLightbox(); } });

    loadFolders();
  </script>

  <script>
    /* Waffle & QR Logic */
    const waffleBtn = document.getElementById('waffle-btn');
    const drawer = document.getElementById('nav-drawer');
    waffleBtn.addEventListener('click', () => drawer.classList.toggle('open'));
    document.addEventListener('click', (e) => {
      if (!drawer.contains(e.target) && !waffleBtn.contains(e.target)) drawer.classList.remove('open');
    });

    const qrBtn = document.getElementById('qr-btn');
    const qrModal = document.getElementById('qr-modal');
    const qrClose = document.getElementById('qr-close');
    const qrCanvas = document.getElementById('qr-canvas');
    let qrDone = false;
    qrBtn.addEventListener('click', () => {
      if (!qrDone) {
        const url = window.location.href;
        document.getElementById('qr-url-text').textContent = url;
        QRCode.toCanvas(qrCanvas, url, { width: 220, margin: 2, color: { dark: '#FF2D78', light: '#ffffff' } });
        qrDone = true;
      }
      qrModal.classList.add('open');
    });
    qrClose.addEventListener('click', () => qrModal.classList.remove('open'));
  </script>
</body>
</html>
