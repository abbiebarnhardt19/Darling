<div class="qr-modal-overlay" id="qr-modal">
  <div class="qr-modal-box">

    <p class="qr-modal-subtitle">Scan with your camera to open this page on any device.</p>
    <canvas id="qr-canvas"></canvas>
    <p class="qr-url-text" id="qr-url-text"></p>

</div>

<body>
  <nav>
  <a class="nav-logo" href="index.html">
    <span class="nav-title">Abbie + Ben</span>
  </a>

  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="games.html">Games</a></li>
    <li><a href="names.html">Names</a></li>
    <li><a href="calendar.html">Calendar</a></li>
    <li><a href="inspo.html"class="active">Inspo Pics</a></li>
  </ul>

  <div class="nav-right">
    <button class="nav-qr-btn" id="qr-btn" title="Open on your phone">📱</button>

    <div class="theme-toggle-wrapper">
      <label class="theme-toggle">
        <input type="checkbox" id="theme-checkbox" />
        <span class="track"></span>
        <span class="knob"></span>
      </label>
    </div>

    <button class="nav-waffle" id="waffle-btn" aria-label="Open menu">
      <span class="waffle-icon">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </span>
    </button>
  </div>
</nav>

<nav class="nav-drawer" id="nav-drawer">
  <a href="index.html" class="active">Home</a>
  <a href="games.html">Games</a>
  <a href="names.html">Names</a>
  <a href="calendar.html">Calendar</a>
  <a href="inspo.html">Inspo Pics</a>
</nav>

  <!-- POLAROID GRID -->
  <div class="polaroid-grid" id="polaroid-grid">
    <div class="state-msg" id="grid-status">Loading folders...</div>
  </div>

  <!-- GALLERY MODAL -->
  <div class="modal-overlay" id="gallery-modal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Folder</span>
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
      </div>
      <div class="gallery-grid" id="gallery-grid">
        <div class="modal-loading">Loading images...</div>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
    <img id="lightbox-img" src="" alt="Full size" />
    <a class="lightbox-dl" id="lightbox-dl" href="#" download>⬇ Download</a>
  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <script>
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const INSPO_BUCKET = "Inspo Pics";

    // ── TILTS for polaroid cards ──
    const tilts = [-3, 2, -1.5, 3, -2.5, 1, -2, 2.5];

    // ── THEME ──
    const checkbox = document.getElementById("theme-checkbox");
    const root = document.documentElement;
    const savedTheme = localStorage.getItem("abbiebenTheme") || "light";
    if (savedTheme === "dark") {
      root.setAttribute("data-theme", "dark");
      checkbox.checked = true;
    }
    checkbox.addEventListener("change", () => {
      const theme = checkbox.checked ? "dark" : "light";
      root.setAttribute("data-theme", theme);
      localStorage.setItem("abbiebenTheme", theme);
    });

    // ── LOAD FOLDERS & BUILD POLAROIDS ──
    async function loadFolders() {
      const grid = document.getElementById("polaroid-grid");
      const status = document.getElementById("grid-status");

      const { data, error } = await sb.storage
        .from(INSPO_BUCKET)
        .list("", { limit: 1000 });

      if (error) {
        status.textContent = "Couldn't load folders 😢";
        console.error(error);
        return;
      }

      // Folders have id === null
      const folders = data.filter(item => item.id === null && item.name);

      if (!folders.length) {
        status.textContent = "No folders found in Inspo Pics.";
        return;
      }

      status.remove();

      for (let i = 0; i < folders.length; i++) {
        const folder = folders[i].name;
        const tilt = tilts[i % tilts.length];
        const card = await buildPolaroid(folder, tilt);
        grid.appendChild(card);
      }
    }

    // ── BUILD A SINGLE POLAROID ──
    async function buildPolaroid(folderName, tilt) {
      const card = document.createElement("div");
      card.className = "polaroid";
      card.style.setProperty("--tilt", `${tilt}deg`);
      card.onclick = () => openGallery(folderName);

      const label = document.createElement("div");
      label.className = "polaroid-label";
      label.textContent = folderName;

      // Start with a color block placeholder — img added only if we find one
      const placeholder = document.createElement("div");
      placeholder.className = "polaroid-photo";
      placeholder.style.backgroundColor = "var(--primary-pale)";

      card.appendChild(placeholder);
      card.appendChild(label);

      const { data } = await sb.storage
        .from(INSPO_BUCKET)
        .list(folderName, { limit: 100 });

      if (data && data.length) {
        const images = data.filter(f => /\.(jpg|jpeg|png|webp|gif)$/i.test(f.name));

        if (images.length) {
          const pick = images[Math.floor(Math.random() * images.length)];
          const url = sb.storage
            .from(INSPO_BUCKET)
            .getPublicUrl(`${folderName}/${pick.name}`).data.publicUrl;

          const img = document.createElement("img");
          img.className = "polaroid-photo";
          img.alt = folderName;
          img.src = url;

          img.onload = () => {
            // Swap the color block for the real image
            card.replaceChild(img, placeholder);
          };
          // If image fails, placeholder color block stays — no broken icon
        }
      }

      return card;
    }
    // ── OPEN GALLERY MODAL ──
    async function openGallery(folderName) {
      document.getElementById("modal-title").textContent = folderName;
      document.getElementById("gallery-grid").innerHTML =
        '<div class="modal-loading">Loading images...</div>';
      document.getElementById("gallery-modal").classList.add("open");
      document.body.style.overflow = "hidden";

      const { data, error } = await sb.storage
        .from(INSPO_BUCKET)
        .list(folderName, { limit: 500 });

      const galleryGrid = document.getElementById("gallery-grid");

      if (error || !data || !data.length) {
        galleryGrid.innerHTML = '<div class="modal-loading">No images found.</div>';
        return;
      }

      const images = data.filter(f => /\.(jpg|jpeg|png|webp|gif)$/i.test(f.name));

      if (!images.length) {
        galleryGrid.innerHTML = '<div class="modal-loading">No images in this folder.</div>';
        return;
      }

      galleryGrid.innerHTML = "";

      images.forEach(file => {
        const publicUrl = sb.storage
          .from(INSPO_BUCKET)
          .getPublicUrl(`${folderName}/${file.name}`).data.publicUrl;

        const item = document.createElement("div");
        item.className = "gallery-item";

        const img = document.createElement("img");
        img.src = publicUrl;
        img.alt = file.name;
        img.loading = "lazy";
        img.onclick = () => openLightbox(publicUrl, file.name);

        const dlBtn = document.createElement("a");
        dlBtn.className = "dl-btn";
        dlBtn.href = publicUrl;
        dlBtn.download = file.name;
        dlBtn.textContent = "⬇ Save";
        dlBtn.onclick = e => e.stopPropagation();

        item.appendChild(img);
        item.appendChild(dlBtn);
        galleryGrid.appendChild(item);
      });
    }

    // ── CLOSE MODAL ──
    function closeModal() {
      document.getElementById("gallery-modal").classList.remove("open");
      document.body.style.overflow = "";
    }

    // Close modal on overlay click
    document.getElementById("gallery-modal").addEventListener("click", function(e) {
      if (e.target === this) closeModal();
    });

    // ── LIGHTBOX ──
    function openLightbox(url, filename) {
      document.getElementById("lightbox-img").src = url;
      document.getElementById("lightbox-dl").href = url;
      document.getElementById("lightbox-dl").download = filename;
      document.getElementById("lightbox").classList.add("open");
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("open");
      document.getElementById("lightbox-img").src = "";
    }

    // Close lightbox on background click
    document.getElementById("lightbox").addEventListener("click", function(e) {
      if (e.target === this) closeLightbox();
    });

    // ── KEYBOARD SUPPORT ──
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        closeLightbox();
        closeModal();
      }
    });

    // ── INIT ──
    loadFolders();
  </script>

  <script>
  /* Waffle menu */
  const waffleBtn = document.getElementById('waffle-btn');
  const drawer    = document.getElementById('nav-drawer');

  waffleBtn.addEventListener('click', () => {
    drawer.classList.toggle('open');
  });

  drawer.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => drawer.classList.remove('open'));
  });

  document.addEventListener('click', (e) => {
    if (!drawer.contains(e.target) && !waffleBtn.contains(e.target)) {
      drawer.classList.remove('open');
    }
  });

  /* QR Code */
  const qrBtn    = document.getElementById('qr-btn');
  const qrModal  = document.getElementById('qr-modal');
  const qrClose  = document.getElementById('qr-close');
  const qrCanvas = document.getElementById('qr-canvas');
  let qrDone     = false;

  qrBtn.addEventListener('click', () => {
    if (!qrDone) {
      const url = window.location.href;
      document.getElementById('qr-url-text').textContent = url;
      QRCode.toCanvas(qrCanvas, url, { width: 220, margin: 2,
        color: { dark: '#FF2D78', light: '#ffffff' }
      });
      qrDone = true;
    }
    qrModal.classList.add('open');
  });

  qrClose.addEventListener('click', () => qrModal.classList.remove('open'));
  qrModal.addEventListener('click', (e) => {
    if (e.target === qrModal) qrModal.classList.remove('open');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') qrModal.classList.remove('open');
  });
</script>

</body>
</html>
